<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bảng Sản Phẩm</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e2ddd6;
    --accent: #c8813a;
    --accent-dark: #a5621e;
    --accent2: #3a7fc8;
    --accent2-light: #e8f2fd;
    --text: #1a1612;
    --text-muted: #7a7168;
    --danger: #c0392b;
    --success: #27ae60;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
    --radius: 12px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--accent);
    letter-spacing: .5px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 8px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    letter-spacing: .2px;
  }

  .btn-mode {
    background: var(--bg);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-mode:hover { background: var(--border); color: var(--text); }
  .btn-mode.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: #fff;
  }
  .btn-add:hover { background: var(--accent-dark); }

  /* ── GRID ── */
  main {
    padding: 28px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: var(--transition);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    background: #ede9e2;
    display: block;
    cursor: pointer;
    transition: transform .4s ease;
  }
  .card:hover .card-img { transform: scale(1.03); }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #ede9e2 0%, #d8d1c5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b5aa9e;
    font-size: 2.5rem;
  }

  .card-img-wrap {
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  .card-img-wrap .open-link {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: none;
  }
  .mode-view .card-img-wrap .open-link { display: block; }

  .card-body {
    padding: 12px 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── VIEW CARD ── */
  .card-title-view {
    font-size: .875rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    cursor: pointer;
    user-select: text;
    word-break: break-word;
  }
  .card-title-view:hover { color: var(--accent); }

  /* Link rows in view mode */
  .link-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .link-badge {
    flex-shrink: 0;
    font-size: .65rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 5px;
    letter-spacing: .3px;
    cursor: pointer;
    border: none;
    transition: var(--transition);
  }
  .link-badge-1 {
    background: #fff3e0;
    color: var(--accent);
    border: 1px solid #f5dfc0;
  }
  .link-badge-1:hover { background: var(--accent); color: #fff; }

  .link-badge-2 {
    background: var(--accent2-light);
    color: var(--accent2);
    border: 1px solid #c2dbf5;
  }
  .link-badge-2:hover { background: var(--accent2); color: #fff; }

  .card-link-view {
    font-size: .72rem;
    color: var(--text-muted);
    text-decoration: none;
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .card-link-view:hover { color: var(--accent); text-decoration: underline; }

  /* product ID pill */
  .pid-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: .68rem;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 8px;
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: .2px;
  }
  .pid-pill:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* copy toast */
  .copy-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1612;
    color: #fff;
    padding: 8px 20px;
    border-radius: 99px;
    font-size: .8rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 9999;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── EDIT CARD ── */
  .card-edit-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 5px;
    z-index: 10;
  }
  .mode-view .card-edit-actions { display: none; }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .9rem;
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(4px);
  }
  .icon-btn-del { background: rgba(255,255,255,.85); color: var(--danger); }
  .icon-btn-del:hover { background: var(--danger); color: #fff; }

  .card-field {
    width: 100%;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: .82rem;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .card-field:focus { border-color: var(--accent); background: #fff; }
  .card-field::placeholder { color: #bcb6ae; }
  .card-field-title { font-weight: 600; font-size: .85rem; }

  /* link2 field has blue accent */
  .card-field-link2:focus { border-color: var(--accent2); }

  /* field label wrapper */
  .field-label {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .field-tag {
    font-size: .62rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    letter-spacing: .3px;
  }
  .field-tag-1 { background: #fff3e0; color: var(--accent); border: 1px solid #f5dfc0; }
  .field-tag-2 { background: var(--accent2-light); color: var(--accent2); border: 1px solid #c2dbf5; }

  /* auto-filled shimmer */
  @keyframes autofill-pulse {
    0% { background: #e8f5e9; }
    100% { background: var(--bg); }
  }
  .card-field.just-filled { animation: autofill-pulse .5s ease; }

  /* pid display in edit */
  .pid-edit {
    font-size: .68rem;
    color: var(--text-muted);
    text-align: center;
    padding: 2px 0 0;
    letter-spacing: .2px;
  }
  .pid-edit span {
    font-weight: 700;
    color: var(--accent);
  }

  /* img paste zone */
  .img-paste-zone {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #ede9e2 0%, #d8d1c5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #a09890;
    font-size: .78rem;
    cursor: pointer;
    border-bottom: 1px dashed var(--border);
    position: relative;
    transition: background .2s;
  }
  .img-paste-zone:hover { background: #e5dfd5; }
  .img-paste-zone .icon { font-size: 1.8rem; }
  .img-paste-zone input[type=text] {
    width: 90%;
    margin-top: 6px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: .75rem;
    padding: 5px 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,.7);
    color: var(--text);
    outline: none;
    text-align: center;
  }
  .img-paste-zone input[type=text]:focus { border-color: var(--accent); }

  /* ── ADD CARD ── */
  .card-add {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #bcb6ae;
    font-size: .85rem;
    cursor: pointer;
    transition: var(--transition);
    background: transparent;
  }
  .card-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,129,58,.04); }
  .card-add .big-plus { font-size: 2rem; line-height: 1; }
  .mode-view .card-add { display: none; }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: .95rem; }

  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
    font-size: .9rem;
  }

  .mode-badge {
    font-size: .72rem;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .mode-badge.view { background: #e8f5e9; color: #27ae60; }
  .mode-badge.edit { background: #fff3e0; color: #e67e22; }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    header { padding: 0 14px; }
    .logo { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🛍 Shop Grid</div>
  <div class="header-actions">
    <span id="modeBadge" class="mode-badge view">👁 Xem</span>
    <button class="btn btn-mode active" id="btnView" onclick="setMode('view')">👁 Xem</button>
    <button class="btn btn-mode" id="btnEdit" onclick="setMode('edit')">✏️ Chỉnh sửa</button>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <div class="loading">⏳ Đang tải dữ liệu...</div>
  </div>
</main>

<div class="copy-toast" id="copyToast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnop9__w-HsHWaqjaPVYgCctrGNdWo34w",
  authDomain: "tiktokwin-cbb94.firebaseapp.com",
  databaseURL: "https://tiktokwin-cbb94-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tiktokwin-cbb94",
  storageBucket: "tiktokwin-cbb94.firebasestorage.app",
  messagingSenderId: "545558950214",
  appId: "1:545558950214:web:539a4d5841290078917547",
  measurementId: "G-C8KSTTKJRZ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const PRODUCTS_REF = ref(db, 'products');

// ─── STATE ───────────────────────────────────────────────
let currentMode = 'view';
let products = {};

// ─── URL CONVERSION UTILS ────────────────────────────────

/**
 * Extract TikTok product ID from either link format.
 * Link 1: .../pdp/[slug-]/ID?... or .../pdp/ID
 * Link 2: .../view/product/ID?...
 */
function extractProductId(url) {
  if (!url) return null;
  url = url.trim();

  // Link 2 pattern: /view/product/{ID}
  let m = url.match(/\/view\/product\/(\d{10,20})/);
  if (m) return m[1];

  // Link 1 pattern: /pdp/.../{ID} — ID is the last numeric segment in the path
  m = url.match(/\/pdp\/(?:[^/?]*\/)?(\d{10,20})(?:[/?]|$)/);
  if (m) return m[1];

  // Fallback: any large numeric in the URL path (before query)
  const path = url.split('?')[0];
  const all = [...path.matchAll(/(\d{10,20})/g)];
  if (all.length) return all[all.length - 1][1]; // take last one

  return null;
}

function makeLink1(id) {
  return id ? `https://www.tiktok.com/shop/vn/pdp/${id}` : '';
}

const LINK2_SUFFIX = '?_svg=1&chain_key=%7B%22t%22%3A1%2C%22k%22%3A%22000000000000000007636336038548932359%22%2C%22sc';

function makeLink2(id) {
  return id ? `https://www.tiktok.com/view/product/${id}${LINK2_SUFFIX}` : '';
}

function isLink2(url) {
  return url && url.includes('/view/product/');
}

function isLink1(url) {
  return url && url.includes('/shop/') && url.includes('/pdp/');
}

// ─── MODE ────────────────────────────────────────────────
window.setMode = function(mode) {
  currentMode = mode;
  document.body.className = 'mode-' + mode;
  document.getElementById('btnView').classList.toggle('active', mode === 'view');
  document.getElementById('btnEdit').classList.toggle('active', mode === 'edit');
  const badge = document.getElementById('modeBadge');
  badge.textContent = mode === 'view' ? '👁 Xem' : '✏️ Chỉnh sửa';
  badge.className = 'mode-badge ' + mode;
  renderGrid();
};

// ─── FIREBASE LISTEN ─────────────────────────────────────
onValue(PRODUCTS_REF, snap => {
  products = snap.val() || {};
  renderGrid();
});

// ─── RENDER ──────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const ids = Object.keys(products);
  let html = '';

  if (ids.length === 0 && currentMode === 'view') {
    html = `<div class="empty">
      <div class="empty-icon">🛒</div>
      <p>Chưa có sản phẩm nào. Chuyển sang chỉnh sửa để thêm!</p>
    </div>`;
  } else {
    ids.forEach(id => {
      html += currentMode === 'view' ? cardView(id, products[id]) : cardEdit(id, products[id]);
    });
    if (currentMode === 'edit') {
      html += `<div class="card card-add" onclick="addProduct()">
        <div class="big-plus">＋</div>
        <span>Thêm sản phẩm</span>
      </div>`;
    }
  }

  grid.innerHTML = html;
  if (currentMode === 'edit') ids.forEach(bindEditEvents);
}

// ─── CARD VIEW ───────────────────────────────────────────
function cardView(id, p) {
  const pid = extractProductId(p.link) || extractProductId(p.link2);

  const imgHtml = p.imageUrl
    ? `<img class="card-img" src="${esc(p.imageUrl)}" alt="${esc(p.title||'')}" loading="lazy"/>`
    : `<div class="card-img-placeholder">🖼</div>`;

  const linkHref = p.link || p.link2 || '#';

  const titleHtml = p.title
    ? `<div class="card-title-view" onclick="copyText('${esc(p.title)}','Đã copy tiêu đề!')" title="Click để copy tiêu đề">${esc(p.title)}</div>`
    : `<div class="card-title-view" style="color:#bcb6ae">Chưa có tiêu đề</div>`;

  const link1Html = p.link ? `
    <div class="link-row">
      <button class="link-badge link-badge-1" onclick="copyText('${esc(p.link)}','✅ Đã copy Link 1!')" title="Copy link 1">L1</button>
      <a class="card-link-view" href="${esc(p.link)}" target="_blank" rel="noopener">${esc(p.link)}</a>
    </div>` : '';

  const link2Html = p.link2 ? `
    <div class="link-row">
      <button class="link-badge link-badge-2" onclick="copyText('${esc(p.link2)}','✅ Đã copy Link 2!')" title="Copy link 2">L2</button>
      <a class="card-link-view" href="${esc(p.link2)}" target="_blank" rel="noopener">${esc(p.link2)}</a>
    </div>` : '';

  const pidHtml = pid ? `
    <div class="pid-pill" onclick="copyText('${pid}','✅ Đã copy ID: ${pid}')" title="Copy product ID">
      🔖 ${pid}
    </div>` : '';

  return `<div class="card" data-id="${id}">
    <div class="card-img-wrap">
      ${imgHtml}
      <a class="open-link" href="${linkHref}" target="_blank" rel="noopener"></a>
    </div>
    <div class="card-body">
      ${titleHtml}
      ${link1Html}
      ${link2Html}
      ${pidHtml}
    </div>
  </div>`;
}

// ─── CARD EDIT ───────────────────────────────────────────
function cardEdit(id, p) {
  const pid = extractProductId(p.link) || extractProductId(p.link2);

  const imgZone = p.imageUrl
    ? `<div class="card-img-wrap" style="position:relative">
        <img class="card-img" src="${esc(p.imageUrl)}" alt="" style="cursor:default"/>
        <div style="position:absolute;bottom:6px;left:6px;right:6px;">
          <input type="text" class="card-field" style="font-size:.7rem;background:rgba(255,255,255,.85)"
            placeholder="Link ảnh mới..." data-field="imageUrl" data-id="${id}" value="${esc(p.imageUrl||'')}"/>
        </div>
       </div>`
    : `<div class="img-paste-zone" id="paste-${id}" data-id="${id}">
        <div class="icon">🖼</div>
        <span>Ctrl+V ảnh hoặc nhập link</span>
        <input type="text" placeholder="https://... link ảnh" data-field="imageUrl" data-id="${id}"/>
       </div>`;

  const pidRow = pid
    ? `<div class="pid-edit">Product ID: <span>${pid}</span></div>`
    : '';

  return `<div class="card" data-id="${id}">
    <div class="card-edit-actions">
      <button class="icon-btn icon-btn-del" onclick="deleteProduct('${id}')" title="Xoá">🗑</button>
    </div>
    ${imgZone}
    <div class="card-body">
      <input class="card-field card-field-title" type="text" placeholder="Tiêu đề sản phẩm..."
        data-field="title" data-id="${id}" value="${esc(p.title||'')}"/>

      <div>
        <div class="field-label" style="margin-bottom:4px">
          <span class="field-tag field-tag-1">Link 1</span>
          <span style="font-size:.68rem;color:var(--text-muted)">tiktok.com/shop/.../pdp/...</span>
        </div>
        <input class="card-field" type="text"
          placeholder="https://www.tiktok.com/shop/vn/pdp/..."
          data-field="link" data-id="${id}" value="${esc(p.link||'')}"/>
      </div>

      <div>
        <div class="field-label" style="margin-bottom:4px">
          <span class="field-tag field-tag-2">Link 2</span>
          <span style="font-size:.68rem;color:var(--text-muted)">tiktok.com/view/product/...</span>
        </div>
        <input class="card-field card-field-link2" type="text"
          placeholder="https://www.tiktok.com/view/product/..."
          data-field="link2" data-id="${id}" value="${esc(p.link2||'')}"/>
      </div>

      ${pidRow}
    </div>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── BIND EDIT EVENTS ────────────────────────────────────
function bindEditEvents(id) {
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el => {
    if (el.tagName !== 'INPUT') return;

    el.addEventListener('input', debounce(e => {
      const field = e.target.dataset.field;
      const val = e.target.value.trim();

      if (field === 'link') {
        // link1 changed → derive link2
        const pid = extractProductId(val);
        const derived2 = makeLink2(pid);
        updateField(id, 'link', val);
        if (pid) {
          updateField(id, 'link2', derived2);
          flashField(id, 'link2');
        }

      } else if (field === 'link2') {
        // link2 changed → derive link1
        const pid = extractProductId(val);
        const derived1 = makeLink1(pid);
        updateField(id, 'link2', val);
        if (pid) {
          updateField(id, 'link', derived1);
          flashField(id, 'link');
        }

      } else {
        updateField(id, field, val);
      }
    }, 500));
  });

  // Paste zone for image
  const pasteZone = document.getElementById('paste-' + id);
  if (pasteZone) {
    pasteZone.addEventListener('paste', e => {
      const items = e.clipboardData.items;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const reader = new FileReader();
          reader.onload = ev => updateField(id, 'imageUrl', ev.target.result);
          reader.readAsDataURL(item.getAsFile());
          return;
        }
      }
    });
    pasteZone.addEventListener('click', () => pasteZone.querySelector('input')?.focus());
  }
}

/** Flash a sibling field to indicate it was auto-filled */
function flashField(id, field) {
  const el = document.querySelector(`[data-id="${id}"][data-field="${field}"]`);
  if (!el) return;
  el.classList.remove('just-filled');
  void el.offsetWidth; // reflow
  el.classList.add('just-filled');
  setTimeout(() => el.classList.remove('just-filled'), 600);
}

// ─── FIREBASE OPS ────────────────────────────────────────
window.addProduct = function() {
  push(PRODUCTS_REF, { title: '', imageUrl: '', link: '', link2: '', createdAt: Date.now() });
};

window.deleteProduct = function(id) {
  if (confirm('Xoá sản phẩm này?')) remove(ref(db, 'products/' + id));
};

function updateField(id, field, val) {
  update(ref(db, 'products/' + id), { [field]: val });
}

// ─── COPY HELPERS ────────────────────────────────────────
window.copyText = function(text, msg) {
  if (!text) return;
  // decode HTML entities before copying
  const decoded = text.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard.writeText(decoded).then(() => showToast(msg || '✅ Đã copy!'));
};

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── GLOBAL PASTE (image into focused paste-zone) ────────
document.addEventListener('paste', e => {
  if (currentMode !== 'edit') return;
  const zone = document.activeElement?.closest('.img-paste-zone');
  if (!zone) return;
  const id = zone.dataset.id;
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const reader = new FileReader();
      reader.onload = ev => updateField(id, 'imageUrl', ev.target.result);
      reader.readAsDataURL(item.getAsFile());
      return;
    }
  }
});

// ─── UTILS ───────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// init
document.body.className = 'mode-view';
</script>
